<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go ICO | Utilitarian Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f4f0;
            --text: #111111;
            --accent: #2b5cff;
            --border: 1px solid #111111;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            width: 100%;
            max-width: 960px;
            border: var(--border);
            background: var(--bg);
            display: grid;
            grid-template-columns: 1fr 1fr;
            box-shadow: 16px 16px 0px rgba(0,0,0,0.05);
        }

        @media (max-width: 768px) {
            .wrapper {
                grid-template-columns: 1fr;
            }
        }

        .header-section {
            padding: 3.5rem;
            border-right: var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        @media (max-width: 768px) {
            .header-section {
                border-right: none;
                border-bottom: var(--border);
            }
        }

        .meta-text {
            font-family: 'Space Grotesk', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3.5rem, 6vw, 5.5rem);
            font-weight: 700;
            line-height: 0.85;
            letter-spacing: -0.04em;
            margin-bottom: 2rem;
        }

        .desc {
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: 320px;
            font-weight: 400;
        }

        .form-section {
            padding: 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        label {
            font-family: 'Space Grotesk', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
        }

        select {
            width: 100%;
            padding: 1rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
            background: transparent;
            border: var(--border);
            border-radius: 0;
            appearance: none;
            cursor: pointer;
            outline: none;
            transition: background 0.2s, color 0.2s;
            background-image: linear-gradient(45deg, transparent 50%, var(--text) 50%), linear-gradient(135deg, var(--text) 50%, transparent 50%);
            background-position: calc(100% - 20px) calc(1em + 2px), calc(100% - 15px) calc(1em + 2px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
        }

        select:focus {
            background-color: var(--text);
            color: var(--bg);
            background-image: linear-gradient(45deg, transparent 50%, var(--bg) 50%), linear-gradient(135deg, var(--bg) 50%, transparent 50%);
        }

        .drop-zone {
            border: 1px dashed var(--text);
            padding: 3.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            background: transparent;
        }

        .drop-zone.dragover, .drop-zone:hover {
            background: #e6e6e2;
            border-style: solid;
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-name {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .file-hint {
            font-family: 'Space Grotesk', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            opacity: 0.7;
        }

        .btn {
            background: var(--text);
            color: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1.25rem;
            border: var(--border);
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            border-radius: 0;
        }

        .btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn:disabled {
            background: #a0a0a0;
            border-color: #a0a0a0;
            color: #fff;
            cursor: not-allowed;
        }

        /* Brutalist Toast */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 9999;
        }

        .toast {
            background: var(--text);
            color: var(--bg);
            border: 1px solid var(--text);
            padding: 1.25rem 1.5rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-width: 320px;
            animation: slideIn 0.3s ease forwards;
            border-radius: 0;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
        }

        .toast.success { 
            background: var(--accent); 
            border-color: var(--accent);
            color: #fff;
        }
        
        .toast.error { 
            background: #ff3333; 
            border-color: #ff3333;
            color: #fff;
        }

        .toast .close-btn {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 1.5rem;
            margin-left: 1.5rem;
            line-height: 1;
        }

        @keyframes slideIn {
            0% { transform: translateX(100%); opacity: 0;}
            100% { transform: translateX(0); opacity: 1;}
        }
        @keyframes slideOut {
            100% { transform: translateX(100%); opacity: 0;}
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header-section">
            <div>
                <div class="meta-text">EST. 2026 / TOOL NO. 001</div>
                <h1>go-ico</h1>
                <p class="desc">A utilitarian tool that converts your images into precise, high-quality .ico formats. Drag, drop, and deploy.</p>
            </div>
            <div class="meta-text" style="margin-bottom: 0; margin-top: 4rem;">
                ↓ UPLOAD AND CONVERT
            </div>
        </div>
        
        <div class="form-section">
            <form id="upload-form" action="/upload" method="POST" enctype="multipart/form-data">
                <div class="input-group">
                    <label for="size"><span>Target Size</span><span>PX</span></label>
                    <select name="size" id="size">
                        <option value="16">16 × 16</option>
                        <option value="32" selected>32 × 32</option>
                        <option value="48">48 × 48</option>
                        <option value="64">64 × 64</option>
                        <option value="128">128 × 128</option>
                        <option value="256">256 × 256</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Input Files</label>
                    <div class="drop-zone" id="drop-zone">
                        <input type="file" name="images" id="file-input" multiple accept="image/*" />
                        <div class="file-name" id="file-name-display">[SELECT FILES]</div>
                        <div class="file-hint">SUPPORTED: PNG, JPG, WEBP</div>
                    </div>
                </div>

                <button type="submit" class="btn">Execute Conversion</button>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // File Input Logic
        const fileInput = document.getElementById("file-input");
        const fileNameDisplay = document.getElementById("file-name-display");
        const dropZone = document.getElementById("drop-zone");

        fileInput.addEventListener("change", (e) => {
            const files = e.target.files;
            if (files.length > 0) {
                if (files.length === 1) {
                    fileNameDisplay.textContent = files[0].name.toUpperCase();
                } else {
                    fileNameDisplay.textContent = `[${files.length} FILES SELECTED]`;
                }
                dropZone.style.borderStyle = 'solid';
            } else {
                fileNameDisplay.textContent = "[SELECT FILES]";
                dropZone.style.borderStyle = 'dashed';
            }
        });

        // Drag and drop effects
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            }, false);
        });

        // Toast System
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            toast.innerHTML = `
                <span>${message}</span>
                <button class="close-btn">&times;</button>
            `;

            container.appendChild(toast);

            const removeToast = () => {
                toast.style.animation = 'slideOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            };

            toast.querySelector('.close-btn').addEventListener('click', removeToast);
            setTimeout(removeToast, 4000);
        }

        // Form Submit via Fetch with Toast
        const form = document.getElementById('upload-form');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (fileInput.files.length === 0) {
                showToast("ERROR: NO IMAGES SELECTED", "error");
                return;
            }

            const formData = new FormData(form);
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'PROCESSING...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errText = await response.text();
                    showToast(`ERROR: ${errText.toUpperCase()}`, "error");
                } else {
                    // Trigger download manually for ajax response
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    
                    let filename = "icons.zip"; 
                    const disposition = response.headers.get('Content-Disposition');
                    if (disposition && disposition.indexOf('attachment') !== -1) {
                        const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                        const matches = filenameRegex.exec(disposition);
                        if (matches != null && matches[1]) { 
                            filename = matches[1].replace(/['"]/g, '');
                        }
                    }
                    
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                    
                    showToast("SUCCESS: FILE DOWNLOADED", "success");
                    
                    // Reset form visual
                    form.reset();
                    fileNameDisplay.textContent = "[SELECT FILES]";
                    dropZone.style.borderStyle = 'dashed';
                }
            } catch (error) {
                showToast("ERROR: NETWORK FAILURE", "error");
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
